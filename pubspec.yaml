name: scada_alarm_client
description: "Industrial SCADA alarm monitoring client for operators"
publish_to: 'none'

version: 1.2.0+2

environment:
  sdk: ^3.8.1
dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Firebase - Complete Suite
  firebase_core: ^3.0.0
  cloud_firestore: ^5.0.0
  firebase_messaging: ^15.0.0
  firebase_storage: ^12.0.0
  
  # Local Notifications
  flutter_local_notifications: ^17.0.0
  
  # UI Enhancements
  shimmer: ^3.0.0
  animated_text_kit: ^4.2.2
  lottie: ^3.1.0
  flutter_animate: ^4.5.0
  
  # Connectivity & Network
  connectivity_plus: ^6.0.1
  
  # Utils
  intl: ^0.19.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  path_provider: ^2.1.2
  share_plus: ^7.2.2
  
  cupertino_icons: ^1.0.8
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  
  # Code Generation
  build_runner: ^2.4.8
  riverpod_generator: ^2.4.0
  freezed: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
  # Assets
  assets:
    - assets/images/
    - assets/animations/
  
  # Custom Fonts  
  # fonts:
  #   - family: Roboto
  #     fonts:
  #       - asset: assets/fonts/Roboto-Regular.ttf
  #       - asset: assets/fonts/Roboto-Bold.ttf
  #         weight: 700
